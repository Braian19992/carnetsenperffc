<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carnet Enperf FC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#070d1c;min-height:100vh;padding:24px;display:flex;align-items:flex-start;justify-content:center;gap:24px;flex-wrap:wrap}
.panel{background:#0d1526;border-radius:14px;padding:20px;width:290px;border:1px solid #1a2a44;flex-shrink:0}
.panel h2{color:#6090c0;font-size:11px;font-weight:600;margin-bottom:14px;letter-spacing:.1em;text-transform:uppercase}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:#405070;margin-bottom:3px;letter-spacing:.04em}
.field input,.field select{width:100%;padding:7px 10px;background:#070d1c;border:1px solid #1a2a44;border-radius:7px;font-size:13px;color:#d0e0f0;outline:none}
.field input:focus,.field select:focus{border-color:#2060c0}
.photo-zone{border:2px dashed #1a2a44;border-radius:10px;padding:12px;text-align:center;cursor:pointer;position:relative;margin-bottom:12px;background:#070d1c;transition:border-color .15s}
.photo-zone:hover{border-color:#2060c0}
.photo-zone img{width:64px;height:64px;border-radius:6px;object-fit:cover;margin-bottom:5px;border:2px solid #2060c0}
.photo-zone p{font-size:11px;color:#405070}
.photo-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.btn{width:100%;padding:10px;font-size:13px;font-weight:700;background:#2060c0;color:#fff;border:none;border-radius:8px;cursor:pointer;letter-spacing:.05em;margin-bottom:6px}
.btn:hover{background:#1a4fa0}
.preview-area{display:flex;flex-direction:column;align-items:center;gap:16px;padding-top:4px}
.carnet-label{color:#405070;font-size:11px;letter-spacing:.08em;text-transform:uppercase;align-self:flex-start}
canvas{border-radius:12px;display:none;box-shadow:0 6px 32px rgba(0,0,0,.7);max-width:580px;width:100%}
.placeholder{background:#0d1526;border-radius:12px;width:560px;max-width:90vw;height:296px;display:flex;align-items:center;justify-content:center;color:#1e3050;font-size:13px;border:1px dashed #1a2a44;flex-direction:column;gap:8px}
.placeholder span{font-size:36px;opacity:.4}
.btn-dl{display:none;padding:9px 28px;font-size:13px;border-radius:8px;cursor:pointer;background:#2060c0;border:none;color:#fff;font-weight:700;letter-spacing:.04em}
.divider{width:560px;max-width:90vw;height:1px;background:linear-gradient(90deg,transparent,#1a2a44,transparent);display:none}
</style>
</head>
<body>
<div class="panel">
  <h2>Datos del socio</h2>
  <div class="photo-zone">
    <img id="pp" src="" style="display:none" alt="foto">
    <div id="pi" style="font-size:30px;margin-bottom:6px;opacity:.4">📷</div>
    <p id="pt">Subí tu foto</p>
    <input type="file" accept="image/*" id="fi">
  </div>
  <div class="field"><label>Apellido y nombre</label><input type="text" id="nombre" placeholder="BENADUCCI LUCAS"></div>
  <div class="field"><label>N° de socio</label><input type="text" id="num" placeholder="01"></div>
  <div class="field"><label>Categoría</label>
    <select id="cat">
      <option>JUVENIL</option><option>ACTIVO</option><option>VITALICIO</option>
      <option>JUGADOR</option><option>CUERPO TÉCNICO</option>
    </select>
  </div>
  <div class="field"><label>DNI</label><input type="text" id="dni" placeholder="36274527"></div>
  <div class="field"><label>Vigencia</label><input type="text" id="anio" value="2026"></div>
  <button class="btn" onclick="gen()">&#9654; GENERAR CARNET</button>
</div>

<div class="preview-area">
  <div class="placeholder" id="ph"><span>🪪</span>El carnet aparecerá aquí</div>
  <span class="carnet-label" id="lbl-frente" style="display:none">— FRENTE —</span>
  <canvas id="frente"></canvas>
  <div class="divider" id="div1"></div>
  <span class="carnet-label" id="lbl-dorso" style="display:none">— DORSO —</span>
  <canvas id="dorso"></canvas>
  <button class="btn-dl" id="dl-frente" onclick="dlCarnet('frente')">&#11015; Descargar FRENTE</button>
  <button class="btn-dl" id="dl-dorso" onclick="dlCarnet('dorso')">&#11015; Descargar DORSO</button>
</div>

let photoDataURL = null;

document.getElementById('fi').addEventListener('change', function(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    photoDataURL=ev.target.result;
    document.getElementById('pp').src=photoDataURL;
    document.getElementById('pp').style.display='block';
    document.getElementById('pi').style.display='none';
    document.getElementById('pt').textContent='✓ Foto lista';
  };
  r.readAsDataURL(file);
});

const CAT_BADGE={
  'JUVENIL':'#0a5a9e','ACTIVO':'#0a5a9e','VITALICIO':'#5a20a0',
  'JUGADOR':'#0a5a9e','CUERPO TÉCNICO':'#2a3a50'
};
const DPR=2, W_CSS=560, H_CSS=300;

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function setupCanvas(id){
  const canvas=document.getElementById(id);
  canvas.width=W_CSS*DPR; canvas.height=H_CSS*DPR;
  canvas.style.width=W_CSS+'px'; canvas.style.height=H_CSS+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(DPR,DPR);
  return {ctx,W:W_CSS,H:H_CSS};
}

  const logo=new Image(), bandera=new Image();
  let n=0;
  function check(){ if(++n===2){ renderFrente(logo,bandera); renderDorso(logo,bandera); } }
  logo.onload=check; logo.onerror=check;
  bandera.onload=check; bandera.onerror=check;
  logo.src=LOGO_SRC; bandera.src=BANDERA_SRC;
}

/* ══════════ FRENTE ══════════ */
function renderFrente(logo,bandera){
  const nombre=(document.getElementById('nombre').value.trim()||'APELLIDO NOMBRE').toUpperCase();
  const num=document.getElementById('num').value.trim()||'01';
  const cat=document.getElementById('cat').value;
  const dni=document.getElementById('dni').value.trim()||'—';
  const anio=document.getElementById('anio').value.trim()||'2026';
  const badge=CAT_BADGE[cat]||'#0a5a9e';
  const {ctx,W,H}=setupCanvas('frente');

  rr(ctx,0,0,W,H,12); ctx.save(); ctx.clip();
  ctx.fillStyle='#050c1a'; ctx.fillRect(0,0,W,H);
  if(bandera.complete&&bandera.naturalWidth>0){
    const bW=bandera.naturalWidth,bH=bandera.naturalHeight;
    const scale=W/bW, dw=bW*scale, dh=bH*scale;
    ctx.globalAlpha=0.55; ctx.drawImage(bandera,0,-(dh-H)*0.55,dw,dh); ctx.globalAlpha=1;
  }
  const ovH=ctx.createLinearGradient(0,0,W,0);
  ovH.addColorStop(0,'rgba(3,7,18,0.90)'); ovH.addColorStop(0.28,'rgba(3,7,18,0.82)');
  ovH.addColorStop(0.52,'rgba(3,7,18,0.48)'); ovH.addColorStop(1,'rgba(3,7,18,0.62)');
  ctx.fillStyle=ovH; ctx.fillRect(0,0,W,H);
  const ovV=ctx.createLinearGradient(0,0,0,H);
  ovV.addColorStop(0,'rgba(3,7,18,0.30)'); ovV.addColorStop(0.15,'rgba(3,7,18,0)');
  ovV.addColorStop(0.85,'rgba(3,7,18,0)'); ovV.addColorStop(1,'rgba(3,7,18,0.35)');
  ctx.fillStyle=ovV; ctx.fillRect(0,0,W,H);
  ctx.restore();

  ctx.save(); rr(ctx,0,0,W,H,12); ctx.clip();
  ctx.fillStyle='rgba(3,7,18,0.88)'; ctx.fillRect(0,0,W,56);
  ctx.fillStyle='#1a5ab8'; ctx.fillRect(0,54,W,2);
  ctx.restore();

  if(logo&&logo.complete&&logo.naturalWidth>0){
    ctx.drawImage(logo,16,4,48,48);
  }
  ctx.textAlign='left';
  ctx.fillStyle='rgba(130,170,230,0.7)'; ctx.font='bold 9px system-ui'; ctx.fillText('SOCIO',72,20);
  ctx.fillStyle='#ffffff'; ctx.font='bold 22px system-ui';
  ctx.shadowColor='rgba(0,0,0,0.7)'; ctx.shadowBlur=5;
  ctx.fillText('ENPERF FC',72,44); ctx.shadowBlur=0;

  const px=14,py=64,pw=132,ph=172;
  const drawPhoto=(imgSrc)=>{
    ctx.save(); rr(ctx,px,py,pw,ph,7); ctx.clip();
    if(imgSrc){
      const foto=new Image();
      foto.onload=function(){
        const sc=Math.max(pw/foto.width,ph/foto.height);
        ctx.drawImage(foto,px+(pw-foto.width*sc)/2,py+(ph-foto.height*sc)/2,foto.width*sc,foto.height*sc);
        ctx.restore(); frenteEnd();
      };
      foto.src=imgSrc; return;
    } else {
      ctx.fillStyle='rgba(15,30,65,0.8)'; ctx.fillRect(px,py,pw,ph);
      ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.font='44px system-ui';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('👤',px+pw/2,py+ph/2); ctx.restore();
    }
    frenteEnd();
  };

  const frenteEnd=()=>{
    ctx.strokeStyle='#1a5ab8'; ctx.lineWidth=2; rr(ctx,px,py,pw,ph,7); ctx.stroke();
    const rx=158; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.fillStyle='rgba(110,160,220,0.65)'; ctx.font='9px system-ui'; ctx.fillText('APELLIDO Y NOMBRE',rx,78);
    ctx.fillStyle='#ffffff'; ctx.font='bold 20px system-ui';
    ctx.shadowColor='rgba(0,0,0,0.85)'; ctx.shadowBlur=5;
    ctx.fillText(nombre.length>22?nombre.slice(0,22)+'…':nombre,rx,100); ctx.shadowBlur=0;
    ctx.fillStyle='rgba(26,90,184,0.3)'; ctx.fillRect(rx,108,W-rx-14,1);
    ctx.fillStyle='rgba(110,160,220,0.65)'; ctx.font='9px system-ui'; ctx.fillText('SOCIO N°:',rx,128);
    ctx.fillStyle='#ffffff'; ctx.font='bold 27px system-ui';
    ctx.shadowColor='rgba(0,0,0,0.85)'; ctx.shadowBlur=5;
    ctx.fillText(num,rx,157); ctx.shadowBlur=0;
    const bx=rx+72,by=137,bw=Math.max(cat.length*7+20,70);
    ctx.fillStyle=badge; rr(ctx,bx,by-15,bw,21,10); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; rr(ctx,bx,by-15,bw,21,10); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 9px system-ui'; ctx.textAlign='center';
    ctx.fillText(cat,bx+bw/2,by); ctx.textAlign='left';
    ctx.fillStyle='rgba(26,90,184,0.3)'; ctx.fillRect(rx,168,W-rx-14,1);
    ctx.fillStyle='rgba(110,160,220,0.65)'; ctx.font='9px system-ui'; ctx.fillText('DNI',rx,184);
    ctx.fillStyle='#fff'; ctx.font='bold 14px system-ui';
    ctx.shadowColor='rgba(0,0,0,0.85)'; ctx.shadowBlur=3;
    ctx.fillText(dni,rx,201);
    ctx.fillStyle='rgba(110,160,220,0.65)'; ctx.font='9px system-ui'; ctx.fillText('VIGENCIA',rx+130,184);
    ctx.fillStyle='#fff'; ctx.font='bold 14px system-ui'; ctx.fillText(anio,rx+130,201); ctx.shadowBlur=0;
    ctx.save(); rr(ctx,0,0,W,H,12); ctx.clip();
    ctx.fillStyle='rgba(3,7,18,0.90)'; ctx.fillRect(0,H-28,W,28);
    ctx.fillStyle='#1a5ab8'; ctx.fillRect(0,H-28,W,2); ctx.restore();
    ctx.fillStyle='rgba(150,195,255,0.72)'; ctx.font='bold 9px system-ui'; ctx.textAlign='center';
    ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=3;
    ctx.fillText('TEMPORADA '+anio+'  ·  enperf.fc',W/2,H-10); ctx.shadowBlur=0;
    document.getElementById('ph').style.display='none';
    document.getElementById('frente').style.display='block';
    document.getElementById('lbl-frente').style.display='block';
    document.getElementById('dl-frente').style.display='inline-block';
    document.getElementById('div1').style.display='block';
  };
  drawPhoto(photoDataURL);
}

/* ══════════ DORSO ══════════ */
function renderDorso(logo,bandera){
  const {ctx,W,H}=setupCanvas('dorso');

  rr(ctx,0,0,W,H,12); ctx.save(); ctx.clip();
  ctx.fillStyle='#030810'; ctx.fillRect(0,0,W,H);
  if(bandera.complete&&bandera.naturalWidth>0){
    const bW=bandera.naturalWidth,bH=bandera.naturalHeight;
    const scale=W/bW, dw=bW*scale, dh=bH*scale;
    ctx.globalAlpha=0.30; ctx.drawImage(bandera,0,-(dh-H)*0.55,dw,dh); ctx.globalAlpha=1;
  }
  ctx.fillStyle='rgba(2,5,14,0.82)'; ctx.fillRect(0,0,W,H);

  // Banda diagonal
  ctx.fillStyle='rgba(20,80,200,0.18)';
  ctx.beginPath(); ctx.moveTo(0,H*0.15); ctx.lineTo(W,0); ctx.lineTo(W,H*0.55); ctx.lineTo(0,H*0.75); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(30,120,255,0.5)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,H*0.72); ctx.lineTo(W,H*0.52); ctx.stroke();
  ctx.restore();

  // Logo como marca de agua — PNG transparente, sin fondo blanco
  if(logo&&logo.complete&&logo.naturalWidth>0){
    ctx.save();
    ctx.globalAlpha=0.10;
    const ls=190;
    ctx.drawImage(logo, W/2-ls/2, H/2-ls/2-10, ls, ls);
    ctx.globalAlpha=1;
    ctx.restore();
  }

  // #SOMOSFAMILIA
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.shadowColor='rgba(20,100,255,0.9)'; ctx.shadowBlur=30;
  ctx.fillStyle='#ffffff'; ctx.font='bold 54px system-ui';
  ctx.fillText('#SOMOSFAMILIA',W/2,118); ctx.shadowBlur=0;

  // Línea separadora
  const gl=ctx.createLinearGradient(0,0,W,0);
  gl.addColorStop(0,'rgba(20,100,255,0)'); gl.addColorStop(0.2,'rgba(20,100,255,0.9)');
  gl.addColorStop(0.8,'rgba(20,100,255,0.9)'); gl.addColorStop(1,'rgba(20,100,255,0)');
  ctx.fillStyle=gl; ctx.fillRect(40,130,W-80,2);

  // #SOLOHABLODEVOS
  ctx.shadowColor='rgba(20,100,255,0.6)'; ctx.shadowBlur=20;
  ctx.fillStyle='rgba(180,210,255,0.92)'; ctx.font='bold 36px system-ui';
  ctx.fillText('#SOLOHABLODEVOS',W/2,178); ctx.shadowBlur=0;

  // Separador redes
  ctx.fillStyle='rgba(26,90,184,0.35)'; ctx.fillRect(40,196,W-80,1);

  // Ícono IG dibujado
  const igIcon=(x,y,size)=>{
    ctx.save();
    ctx.strokeStyle='rgba(150,200,255,0.85)'; ctx.lineWidth=1.5;
    rr(ctx,x,y,size,size,size*0.28); ctx.stroke();
    ctx.beginPath(); ctx.arc(x+size/2,y+size/2,size*0.28,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(150,200,255,0.85)';
    ctx.beginPath(); ctx.arc(x+size*0.72,y+size*0.28,size*0.09,0,Math.PI*2); ctx.fill();
    ctx.restore();
  };

  const accounts=['@Enperf','@Enperf.fc','@Enperfem.fc'];
  const totalW=accounts.length*156;
  const startX=(W-totalW)/2;
  accounts.forEach((acc,i)=>{
    const ax=startX+i*156;
    igIcon(ax+2,212,18);
    ctx.fillStyle='rgba(160,205,255,0.85)'; ctx.font='bold 12px system-ui'; ctx.textAlign='left';
    ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=3;
    ctx.fillText(acc,ax+26,227); ctx.shadowBlur=0;
  });

  // Franja inferior
  ctx.save(); rr(ctx,0,0,W,H,12); ctx.clip();
  ctx.fillStyle='rgba(2,5,14,0.92)'; ctx.fillRect(0,H-28,W,28);
  const gb=ctx.createLinearGradient(0,0,W,0);
  gb.addColorStop(0,'rgba(10,60,200,0)'); gb.addColorStop(0.15,'rgba(30,120,255,1)');
  gb.addColorStop(0.85,'rgba(30,120,255,1)'); gb.addColorStop(1,'rgba(10,60,200,0)');
  ctx.fillStyle=gb; ctx.fillRect(0,H-28,W,2); ctx.restore();

  // Logo pequeño en franja inferior — sin clip circular, directo (PNG transparente)
  if(logo&&logo.complete&&logo.naturalWidth>0){
    ctx.drawImage(logo,14,H-26,22,22);
  }
  ctx.fillStyle='rgba(150,195,255,0.72)'; ctx.font='bold 9px system-ui'; ctx.textAlign='center';
  ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=3;
  ctx.fillText('EST. 2020  ·  enperf.fc',W/2,H-10); ctx.shadowBlur=0;

  document.getElementById('dorso').style.display='block';
  document.getElementById('lbl-dorso').style.display='block';
  document.getElementById('dl-dorso').style.display='inline-block';
}

function dlCarnet(side){
  const canvas=document.getElementById(side);
  const nombre=document.getElementById('nombre').value.trim().replace(/\s+/g,'_')||'socio';
  const a=document.createElement('a');
  a.download='carnet_enperf_'+side+'_'+nombre+'.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
}
</script>
