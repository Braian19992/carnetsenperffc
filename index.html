<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carnet Enperf FC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f4f4f8;padding:20px;color:#111}
.wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:860px;margin:auto;align-items:start}
.form-card{background:#fff;border:1px solid #e0e0e8;border-radius:12px;padding:20px}
h1{font-size:15px;font-weight:600;color:#444;margin-bottom:14px;letter-spacing:.04em}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:3px}
.field input,.field select{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;outline:none}
.field input:focus,.field select:focus{border-color:#1a3a6e}
.photo-zone{border:2px dashed #bbb;border-radius:10px;padding:14px;text-align:center;cursor:pointer;position:relative;margin-bottom:12px;transition:background .15s}
.photo-zone:hover{background:#f8f8ff}
.photo-zone img{width:64px;height:64px;border-radius:50%;object-fit:cover;margin-bottom:6px}
.photo-zone p{font-size:11px;color:#888}
.photo-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.btn{width:100%;padding:10px;font-size:14px;font-weight:600;background:#1a3a6e;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:4px}
.btn:hover{background:#14305c}
.preview{position:sticky;top:20px}
canvas{border-radius:12px;width:100%;display:none;box-shadow:0 2px 16px rgba(0,0,0,.15)}
.placeholder{background:#eef;border-radius:12px;height:200px;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:13px;border:1px solid #dde}
.btn-dl{display:none;width:100%;text-align:center;padding:9px;font-size:13px;margin-top:10px;border-radius:8px;cursor:pointer;background:#f4f4f8;border:1px solid #ccc;color:#333}
.btn-dl:hover{background:#e8e8f0}
@media(max-width:560px){.wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="form-card">
      <h1>CARNET ENPERF FC</h1>
      <div class="photo-zone" id="pz">
        <img id="pp" src="" style="display:none" alt="foto">
        <span id="pi" style="font-size:28px;display:block;margin-bottom:4px">📷</span>
        <p id="pt">Subí tu foto</p>
        <input type="file" accept="image/*" id="fi">
      </div>
      <div class="field"><label>Nombre completo</label><input type="text" id="nombre" placeholder="Lucas Rodríguez"></div>
      <div class="field"><label>DNI</label><input type="text" id="dni" placeholder="38.412.765"></div>
      <div class="field"><label>N° de socio</label><input type="text" id="num" placeholder="0042"></div>
      <div class="field"><label>Categoría</label>
        <select id="cat">
          <option>Juvenil</option>
          <option>Activo</option>
          <option>Vitalicio</option>
          <option>Jugador</option>
          <option>Cuerpo Técnico</option>
        </select>
      </div>
      <div class="field"><label>Año</label><input type="text" id="anio" value="2025"></div>
      <button class="btn" onclick="gen()">Generar carnet</button>
    </div>
  </div>
  <div class="preview">
    <div class="placeholder" id="ph">El carnet aparecerá aquí</div>
    <canvas id="carnet" width="660" height="420"></canvas>
    <button class="btn-dl" id="dl" onclick="dlCarnet()">⬇ Descargar PNG</button>
  </div>
</div>

<script>
let photoDataURL = null;

document.getElementById('fi').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    photoDataURL = ev.target.result;
    document.getElementById('pp').src = photoDataURL;
    document.getElementById('pp').style.display = 'block';
    document.getElementById('pi').style.display = 'none';
    document.getElementById('pt').textContent = '✓ Foto cargada';
  };
  reader.readAsDataURL(file);
});

const CAT_COLORS = {
  'Juvenil':'#1a7a8a',
  'Activo':'#1a3a6e',
  'Vitalicio':'#6a2f9a',
  'Jugador':'#1a6e3a',
  'Cuerpo Técnico':'#8a3a1a'
};

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawQR(ctx, x, y, size, data){
  const cells = 21;
  const cs = Math.floor(size/cells);
  ctx.fillStyle='#ffffff';
  rr(ctx,x-4,y-4,size+8,size+8,4);
  ctx.fill();
  function hash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h;}
  ctx.fillStyle='#111';
  for(let r=0;r<cells;r++){
    for(let c=0;c<cells;c++){
      let dark=false;
      const inTL=(r<7&&c<7), inTR=(r<7&&c>=cells-7), inBL=(r>=cells-7&&c<7);
      if(inTL||inTR||inBL){
        const lr=inTL?r:(inTR?r:r-(cells-7));
        const lc=inTL?c:(inTR?c-(cells-7):c);
        dark=(lr===0||lr===6||lc===0||lc===6||(lr>=2&&lr<=4&&lc>=2&&lc<=4));
      } else if(r===7||r===cells-8||c===7||c===cells-8){}
      else { dark=(Math.abs(hash(data+r*31+c*17))%3===0); }
      if(dark) ctx.fillRect(x+c*cs, y+r*cs, cs, cs);
    }
  }
}

function drawCarnet(logoImg){
  const nombre = document.getElementById('nombre').value.trim() || 'Nombre Apellido';
  const dni    = document.getElementById('dni').value.trim()    || '—';
  const num    = document.getElementById('num').value.trim()    || '0000';
  const cat    = document.getElementById('cat').value;
  const anio   = document.getElementById('anio').value.trim()  || '2025';
  const accent = CAT_COLORS[cat] || '#1a3a6e';

  const canvas = document.getElementById('carnet');
  const ctx = canvas.getContext('2d');
  const W=660, H=420;
  ctx.clearRect(0,0,W,H);

  // Fondo base
  rr(ctx,0,0,W,H,18);
  ctx.fillStyle='#0b1e3d';
  ctx.fill();

  // Banda lateral izquierda
  ctx.fillStyle=accent;
  rr(ctx,0,0,215,H,18);
  ctx.fill();
  ctx.fillRect(196,0,19,H);

  // Línea dorada
  ctx.fillStyle='#f0c040';
  ctx.fillRect(212,0,5,H);

  // Logo (circular, sin deformación)
  ctx.save();
  ctx.beginPath();
  ctx.arc(107, 107, 74, 0, Math.PI*2);
  ctx.clip();
  // Dibujamos la imagen centrada y proporcional (320x320 → fit en 148x148)
  ctx.drawImage(logoImg, 33, 33, 148, 148);
  ctx.restore();

  // Borde sutil del logo
  ctx.beginPath();
  ctx.arc(107,107,74,0,Math.PI*2);
  ctx.strokeStyle='rgba(240,192,64,0.4)';
  ctx.lineWidth=2;
  ctx.stroke();

  // Foto del socio
  const px=107, py=290, pr=52;
  ctx.save();
  ctx.beginPath();
  ctx.arc(px,py,pr,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fill();
  ctx.clip();
  if(photoDataURL){
    const foto = new Image();
    foto.src = photoDataURL;
    foto.onload = function(){
      ctx.drawImage(foto, px-pr, py-pr, pr*2, pr*2);
      ctx.restore();
      postDraw(ctx,W,H,rx,nombre,cat,accent,dni,anio,num,canvas);
    };
  } else {
    ctx.restore();
  }
  if(!photoDataURL){
    postDraw(ctx,W,H,240,nombre,cat,accent,dni,anio,num,canvas);
  }

  // Borde foto
  ctx.beginPath();
  ctx.arc(px,py,pr,0,Math.PI*2);
  ctx.strokeStyle='#f0c040';
  ctx.lineWidth=2.5;
  ctx.stroke();

  // Num socio
  ctx.fillStyle='rgba(240,192,64,0.75)';
  ctx.font='bold 10px system-ui';
  ctx.textAlign='center';
  ctx.fillText('N° SOCIO', 107, 362);
  ctx.font='bold 19px system-ui';
  ctx.fillStyle='#f0c040';
  ctx.fillText('#'+num, 107, 384);

  var rx = 240;
  return rx;
}

function postDraw(ctx,W,H,rx,nombre,cat,accent,dni,anio,num,canvas){
  ctx.textAlign='left';

  // Etiqueta
  ctx.fillStyle='rgba(240,192,64,0.65)';
  ctx.font='bold 10px system-ui';
  ctx.fillText('CARNET DE SOCIO · ENPERF FC', rx, 58);

  // Nombre
  ctx.fillStyle='#ffffff';
  ctx.font='bold 25px system-ui';
  const n = nombre.toUpperCase();
  ctx.fillText(n.length>23 ? n.slice(0,23)+'…' : n, rx, 92);

  // Separador
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.fillRect(rx,104,W-rx-20,1);

  // Badge categoría
  const bw = cat.length*7.5+24;
  ctx.fillStyle=accent;
  rr(ctx,rx,114,bw,22,11);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.font='bold 10px system-ui';
  ctx.textAlign='center';
  ctx.fillText(cat.toUpperCase(), rx+bw/2, 129);
  ctx.textAlign='left';

  // Campos
  const rows=[['DNI / CÉDULA', dni],['VIGENCIA', anio]];
  let cy=162;
  rows.forEach(([lbl,val])=>{
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.font='10px system-ui';
    ctx.fillText(lbl, rx, cy);
    ctx.fillStyle='#fff';
    ctx.font='bold 16px system-ui';
    ctx.fillText(val, rx, cy+19);
    cy+=50;
  });

  // QR
  const qd=78, qx=W-qd-22, qy=H-qd-52;
  drawQR(ctx, qx, qy, qd, nombre+'|'+num+'|'+cat+'|'+anio);
  ctx.fillStyle='rgba(240,192,64,0.55)';
  ctx.font='9px system-ui';
  ctx.textAlign='center';
  ctx.fillText('Verificar socio', qx+qd/2, qy+qd+13);

  // Franja inferior
  ctx.fillStyle='rgba(255,255,255,0.06)';
  rr(ctx,0,H-36,W,36,18);
  ctx.fill();
  ctx.fillRect(0,H-36,W,18);

  ctx.fillStyle='rgba(240,192,64,0.65)';
  ctx.font='bold 10px system-ui';
  ctx.textAlign='center';
  ctx.fillText('ENPERF FC · TEMPORADA '+anio, W/2, H-12);

  document.getElementById('ph').style.display='none';
  canvas.style.display='block';
  document.getElementById('dl').style.display='block';
}

function gen(){
  const logoImg = new Image();
  logoImg.onload = function(){
    const rx = drawCarnet(logoImg);
  };
  logoImg.onerror = function(){
    alert('No se pudo cargar el logo. Asegurate de abrir este archivo desde un servidor local.');
  };
  // El logo se carga desde la misma carpeta
  logoImg.src = 'enperf-logo.jpg';
}

function dlCarnet(){
  const canvas = document.getElementById('carnet');
  const nombre = document.getElementById('nombre').value.trim().replace(/\s+/g,'_')||'socio';
  const a = document.createElement('a');
  a.download = 'carnet_enperf_'+nombre+'.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
